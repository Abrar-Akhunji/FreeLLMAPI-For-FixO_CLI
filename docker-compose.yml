version: '3.8'

services:
  freellmapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freellmapi
    ports:
      - "3001:3001"
    volumes:
      - ./server/data:/app/server/data
    environment:
      - PORT=3001
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    restart: unless-stopped
